<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css?family=Unbounded&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
.banner {
    position: relative;
    background-color: #f9f8ff;
    padding: clamp(40px, 8vw, 80px) clamp(16px, 4vw, 40px);
  }

  .banner__inner {
    position: relative;
    max-width: 1400px;
    margin: 0 auto;
    background-color: #6b5cce;
    border-radius: 32px;
    overflow: visible;
    height: clamp(220px, 24vw, 316px); /* адаптивная высота */
    display: flex;
    align-items: center;
    padding-left: clamp(20px, 5vw, 80px);
    padding-right: calc(clamp(160px, 20vw, 320px) + clamp(16px, 4vw, 40px)); /* место под изображение */
  }

  .banner__content {
    position: relative;
    z-index: 4;
    max-width: 668px;
  }

  .banner__text {
    margin: 0;
    color: #fff;
    font-size: clamp(20px, 4.5vw, 32px);
    font-weight: 400;
    text-align: left;
    font-family: 'Unbounded', sans-serif;
    line-height: 1.2;
  }

  /* Адаптивная группа изображений */
  .banner__image-group {
    position: absolute;
    top: 0;
    right: clamp(16px, 4vw, 40px);
    width: clamp(
      160px,
      calc(180px + (100vw - 320px) * 0.12),
      320px
    );
    height: auto;
    z-index: 5;
  }



  .banner__circle-container {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 130%;
    height: 60%;
    overflow: hidden;
    z-index: 2;
  }

  .banner__circle {
    position: absolute;
   
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 200%;
    background-color: #fff;
    border-radius: 50%;
  }

    /* Фоновое изображение */
    .banner__bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .banner__bg-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }


  
    .banner__image-wrapper {
      position: relative;
      display: block;
      width: 100%;
       top: -100%;
    }

    /* Основное изображение — выступает на 10% вверх */
    .banner__image {
      display: block;
      width: 400px;
      height: 400px;
      position: relative;
      top: -100px; /* ← 10% вверх от высоты родителя */
      z-index: 3;
    }

  
    /* Адаптивность — сохраняем изображение справа на всех устройствах */
    @media (max-width: 768px) {
      .banner {
        padding: 60px 20px;
      }

      .banner__inner {
        padding-left: 20px;
        padding-right: 200px; /* оставляем место под изображение */
        height: 280px;
      }

      .banner__text {
        font-size: 24px;
        line-height: 1.3;
      }

      .banner__image-group {
        width: 200px;
        right: 20px;
      }
      
    }

    @media (max-width: 480px) {
      .banner__inner {
        padding-right: 160px;
        height: 240px;
      }

      .banner__image-group {
        width: 160px;
        right: 16px;
      }

      .banner__text {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="banner__inner">
      <!-- Фон -->
      <div class="banner__bg">
        <img src="./assets/images/v71_40.png" alt="" class="banner__bg-img" />
      </div>

      <div style="display:flex; flex-direction: column;"> 
      <div class="banner__content">
        <p class="banner__text">Первый шаг — самый трудный. Мы сделаем всё остальное.</p>
      </div>

      
      <div class="banner__image-group">
        <div class="banner__image-wrapper">
          <img src="./assets/images/v71_45.png" alt="" class="banner__image" />

          <!-- Полукруг под изображением, обрезается -->
          <div class="banner__circle-container">
            <div class="banner__circle"></div>
          </div>
        </div>
      </div>
      </div>



    </div>
  </div>
</body>
</html>
